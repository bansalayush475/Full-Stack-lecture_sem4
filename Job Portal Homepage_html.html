<!DOCTYPE html>
<html>
<head>
    <title>Job Portal </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<header>
    <div class="logo">JobPortal</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Jobs</a>
        <a href="#">Companies</a>
        <button class="login-btn">Login</button>
    </nav>
</header>

<section class="search-section">
    <h2>Search Jobs</h2>

    <input type="text" id="searchInput" placeholder="Enter job title or company">

    <select id="locationFilter">
        <option value="">All Locations</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Remote">Remote</option>
    </select>

    <select id="typeFilter">
        <option value="">All Types</option>
        <option value="Full-time">Full-time</option>
        <option value="Internship">Internship</option>
    </select>

    <button id="searchBtn">Search</button>
    <button id="resetBtn">Reset</button>
</section>

<section class="form-section">
    <h2 id="formTitle">Post a Job</h2>

    <form id="jobForm">
        <input type="text" id="title" placeholder="Job Title" required>
        <input type="text" id="company" placeholder="Company" required>
        <input type="text" id="location" placeholder="Location" required>
        <input type="text" id="salary" placeholder="Salary" required>
        <input type="text" id="experience" placeholder="Experience" required>
        <input type="text" id="type" placeholder="Job Type" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <button type="submit">Save Job</button>
    </form>
</section>

<section class="jobs-section">
    <h2>Available Jobs</h2>
    <div id="jobList"></div>
</section>

<footer>
    <p>© 2026 JobPortal| Designed by Ayush Bansal</p>
</footer>

</body>
</html>
